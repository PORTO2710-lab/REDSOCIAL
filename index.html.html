<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Service</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #111; /* Gris oscuro casi negro */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            background: #1c1c1c;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.7); /* Drop shadow */
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }

        blockquote {
            border-radius: 12px;
            overflow: hidden;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Instagram Post</h1>

        <blockquote class="instagram-media"
            data-instgrm-permalink="https://www.instagram.com/p/DOg11NJknEb/?img_index=1"
            data-instgrm-version="14"
            style="background:#FFF; border:0; margin: 0 auto;">
        </blockquote>
    </div>

    <script async src="//www.instagram.com/embed.js"></script>

</body>
</html>
